<title>TRAONE レイアウト エディタ v3</title>
<style>

.si:focus{border-color:#4455aa;} .slb{font-size:9px;color:#444;display:block;margin-top:5px;}
.sep{font-size:8px;color:#333;text-transform:uppercase;letter-spacing:.8px;padding:7px 0 4px;border-top:1px solid #141424;margin-top:5px;}

    <label class="slb">奥行 m</label><input id="inD" class="si" type="number" step="0.05" min="0.1" oninput="upd()">
    <label class="slb">高さ m（3D）</label><input id="inH" class="si" type="number" step="0.05" min="0.1" oninput="upd()">
    <label class="slb">色</label><input id="inC" class="si" type="color" oninput="upd()" style="padding:1px;height:22px;cursor:pointer;">

<div style="position:absolute;bottom:0;left:0;right:0;height:26px;background:rgba(0,0,0,.96);border-top:1px solid #111;display:flex;align-items:center;padding:0 12px;">

</div>
<script>
(function(){

var cv=document.getElementById('ced'),ctx=cv.getContext('2d');

function rsz(){
  W=window.innerWidth-148; H=window.innerHeight-64;

function fitRoom(){
  var pad=40;
  var scX=(W-pad*2)/5.7, scY=(H-pad*2)/8.0;
  SC=Math.max(20,Math.min(scX,scY));
  OX=W/2; OY=pad+2.9*SC;
}
function zm(factor,mx,my){
  if(mode!=='2d')return;
  if(mx===undefined){mx=W/2;my=H/2;}
  var wx=(mx-OX)/SC,wz=(my-OY)/SC;
  SC=Math.max(10,Math.min(300,SC*factor));
  OX=mx-wx*SC; OY=my-wz*SC;
}

var IT=/*LAYOUT_START*/[{"lb":"カウンター前","cx":-0.9950000000000001,"cz":-1.34,"w":3.66,"d":0.6,"h":0.92,"col":"#c49020"},{"lb":"カウンター右","cx":0.595,"cz":-2.28,"w":0.47,"d":1.26,"h":0.92,"col":"#c49020"},{"lb":"金庫（大型）","cx":-2.35,"cz":-2.48,"w":0.97,"d":0.8200000000000001,"h":1.35,"col":"#557799"},{"lb":"ショーケース②","cx":-2.57,"cz":-0.1,"w":0.53,"d":1.71,"h":1.18,"col":"#5599ee"},{"lb":"買取記入台","cx":-2.49,"cz":1.19,"w":0.63,"d":0.83,"h":0.82,"col":"#cc9944"},{"lb":"UFO①","cx":-2.52,"cz":1.94,"w":0.62,"d":0.62,"h":1.3,"col":"#ee4433"},{"lb":"UFO②","cx":-2.52,"cz":2.57,"w":0.62,"d":0.62,"h":1.3,"col":"#ee4433"},{"lb":"トレカ棚①","cx":2.79,"cz":-0.41,"w":0.1,"d":0.9,"h":2.2,"col":"#5599ee"},{"lb":"トレカ棚②","cx":2.79,"cz":0.52,"w":0.1,"d":0.9,"h":2.2,"col":"#5599ee"},{"lb":"トレカ棚③","cx":2.79,"cz":1.45,"w":0.1,"d":0.9,"h":2.2,"col":"#5599ee"},{"lb":"トレカ棚④","cx":2.79,"cz":2.38,"w":0.1,"d":0.9,"h":2.2,"col":"#5599ee"},{"lb":"テーブル","cx":0.19499999999999998,"cz":0.5549999999999999,"w":1.43,"d":2.13,"h":0.76,"col":"#9a7030"},{"lb":"椅子A","cx":1.18,"cz":-0.29,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"椅子B","cx":1.18,"cz":0.57,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"椅子C","cx":1.18,"cz":1.41,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"椅子D","cx":-0.78,"cz":-0.3,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"椅子E","cx":-0.79,"cz":0.55,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"椅子F","cx":-0.8,"cz":1.41,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"自販機①","cx":-1.9,"cz":3.32,"w":1.45,"d":0.68,"h":2.5,"col":"#22aa44"},{"lb":"丸テーブル","cx":1.5,"cz":5.1,"w":1,"d":1,"h":0.76,"col":"#9a7030"},{"lb":"屋外椅子①","cx":1.5,"cz":4.28,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"屋外椅子②","cx":1.5,"cz":5.92,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"屋外椅子③","cx":2.32,"cz":5.1,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"屋外椅子④","cx":0.68,"cz":5.1,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"看板","cx":2.92,"cz":4.77,"w":0.11,"d":2.98,"h":2.2,"col":"#dd2222"},{"lb":"椅子","cx":0,"cz":-1.89,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"椅子","cx":-0.8,"cz":-1.89,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"椅子","cx":-1.57,"cz":-1.89,"w":0.4,"d":0.4,"h":0.46,"col":"#4a4a5e"},{"lb":"ショーケース②②","cx":2.16,"cz":-0.99,"w":1.06,"d":0.27,"h":2.5,"col":"#5599ee"}]/*LAYOUT_END*/;
var ORIG=IT.map(function(o){return JSON.parse(JSON.stringify(o));});

var ST=[
 [-3.1,-0.05,2.9,6.2,0.05,3.7,'#252535',1],[-2.85,-0.05,-2.9,5.7,0.05,5.8,'#161626',1],
 [-3.1,3.0,2.9,6.2,0.12,3.7,'#1c1c2c',0.7],
 [-3.06,0,3.05,0.13,3.0,0.13,'#5a5a70',1],[2.93,0,3.05,0.13,3.0,0.13,'#5a5a70',1],
 [-3.06,0,6.42,0.13,3.0,0.13,'#5a5a70',1],[2.93,0,6.42,0.13,3.0,0.13,'#5a5a70',1],

 [2.79,0,-2.9,0.06,3.0,5.8,'#c0b8a8',0.10],[-2.85,0,2.84,2.07,3.0,0.06,'#c0b8a8',0.10],
 [0.78,0,2.84,2.07,3.0,0.06,'#c0b8a8',0.10],
 [-0.84,0,2.83,0.06,3.0,0.07,'#778899',1],[0.78,0,2.83,0.06,3.0,0.07,'#778899',1],
 [-0.78,0,2.84,0.70,2.25,0.04,'#8899cc',0.4],[0.08,0,2.84,0.70,2.25,0.04,'#8899cc',0.4],
 [1.515,0,-2.9,0.07,2.3,1.45,'#aaa8a0',1],[1.585,0,-1.52,1.25,2.3,0.07,'#aaa8a0',1],

 [-0.92,1.96,-2.84,0.74,0.44,0.06,'#111122',1],[0.18,1.96,-2.84,0.74,0.44,0.06,'#111122',1],

];

var sel=-1,dragging=false,resizing=false,rsH=-1,rsS=null,dOX=0,dOZ=0;
var panning=false,panSX=0,panSY=0,panSOX=0,panSOY=0;
var drag3=false,pan3=false,mx0=0,my0=0;
var th=0.8,ph=0.4,ra=16,cTX=0,cTY=1.2,cTZ=1.5;
var VV=[[0.8,0.4,16,0,1.2,1.5],[0.8,1.38,13,0,0,1.5],[0,0.08,14,0,1.5,0],[3.14,0.08,3.8,0,1.2,0.8],[3.14,0.13,9,0,1.5,4.5]];
var FD=[{vi:[4,5,6,7],n:[0,1,0],s:1.38,ci:0},{vi:[3,2,6,7],n:[0,0,1],s:1.00,ci:1},{vi:[0,1,5,4],n:[0,0,-1],s:0.68,ci:2},{vi:[1,2,6,5],n:[1,0,0],s:0.85,ci:3},{vi:[0,3,7,4],n:[-1,0,0],s:0.73,ci:4}];

function w2c(wx,wz){return{cx:OX+wx*SC,cy:OY+wz*SC};}
function c2w(cx,cy){return{wx:(cx-OX)/SC,wz:(cy-OY)/SC};}
function sn(v){return Math.round(v*100)/100;}
function gH(it){var c=w2c(it.cx,it.cz),hw=it.w*SC/2,hd=it.d*SC/2;return[{cx:c.cx-hw,cy:c.cy-hd,cur:'nwse-resize'},{cx:c.cx+hw,cy:c.cy-hd,cur:'nesw-resize'},{cx:c.cx+hw,cy:c.cy+hd,cur:'nwse-resize'},{cx:c.cx-hw,cy:c.cy+hd,cur:'nesw-resize'}];}
function hH(mx,my){if(sel<0)return-1;var hs=gH(IT[sel]);for(var i=0;i<4;i++)if(Math.abs(mx-hs[i].cx)<=7&&Math.abs(my-hs[i].cy)<=7)return i;return-1;}
function hI(mx,my){for(var i=IT.length-1;i>=0;i--){var it=IT[i],c=w2c(it.cx,it.cz);if(mx>=c.cx-it.w*SC/2&&mx<=c.cx+it.w*SC/2&&my>=c.cy-it.d*SC/2&&my<=c.cy+it.d*SC/2)return i;}return-1;}

function apRs(mx,my){
  var w=c2w(mx,my),s=rsS,it=IT[sel];
  var dx=sn(w.wx-s.mx0),dz=sn(w.wz-s.mz0);
  if(rsH===0){it.w=Math.max(0.1,s.w-dx);it.d=Math.max(0.1,s.d-dz);it.cx=s.cx+(s.w-it.w)/2;it.cz=s.cz+(s.d-it.d)/2;}
  if(rsH===1){it.w=Math.max(0.1,s.w+dx);it.d=Math.max(0.1,s.d-dz);it.cx=s.cx+(it.w-s.w)/2;it.cz=s.cz+(s.d-it.d)/2;}
  if(rsH===2){it.w=Math.max(0.1,s.w+dx);it.d=Math.max(0.1,s.d+dz);it.cx=s.cx+(it.w-s.w)/2;it.cz=s.cz+(it.d-s.d)/2;}
  if(rsH===3){it.w=Math.max(0.1,s.w-dx);it.d=Math.max(0.1,s.d+dz);it.cx=s.cx+(s.w-it.w)/2;it.cz=s.cz+(it.d-s.d)/2;}
  sprop();
}

function sprop(){
  var el=document.getElementById('props');
  if(sel<0||sel>=IT.length){el.style.display='none';return;}
  el.style.display='block';var it=IT[sel];
  var mp={inLb:it.lb,inX:it.cx.toFixed(2),inZ:it.cz.toFixed(2),inW:it.w.toFixed(2),inD:it.d.toFixed(2),inH:it.h.toFixed(2)};
  for(var k in mp){var e2=document.getElementById(k);if(document.activeElement!==e2)e2.value=mp[k];}
  var ec=document.getElementById('inC');if(document.activeElement!==ec)ec.value=it.col;
}

function setMode(m){
  mode=m;
  document.getElementById('m2d').className='tb'+(m==='2d'?' on':'');
  document.getElementById('m3d').className='tb'+(m==='3d'?' on':'');
  document.getElementById('p3d').style.display=m==='3d'?'flex':'none';
  document.getElementById('zctrl').style.display=m==='2d'?'flex':'none';
  document.getElementById('stTx').textContent=m==='2d'?'クリック：選択　ドラッグ：移動　空白ドラッグ：パン　ホイール：ズーム':'左ドラッグ：回転　ホイール：ズーム　右ドラッグ：移動';
  sel=-1;sprop();cv.style.cursor='default';
}
function doReset(){IT.length=0;ORIG.forEach(function(o){IT.push(JSON.parse(JSON.stringify(o)));});sel=-1;sprop();fitRoom();}
function sv(n){var v=VV[n];th=v[0];ph=v[1];ra=v[2];cTX=v[3];cTY=v[4];cTZ=v[5];}
function addItem(lb,w,d,h,col){IT.push({lb:lb,cx:0,cz:0,w:w,d:d,h:h,col:col});sel=IT.length-1;sprop();}
function upd(){
  if(sel<0||sel>=IT.length)return;var it=IT[sel];
  it.lb=document.getElementById('inLb').value;
  var xv=parseFloat(document.getElementById('inX').value),zv=parseFloat(document.getElementById('inZ').value);
  var wv=parseFloat(document.getElementById('inW').value),dv=parseFloat(document.getElementById('inD').value),hv=parseFloat(document.getElementById('inH').value);
  if(!isNaN(xv))it.cx=xv;if(!isNaN(zv))it.cz=zv;
  if(!isNaN(wv)&&wv>0)it.w=wv;if(!isNaN(dv)&&dv>0)it.d=dv;if(!isNaN(hv)&&hv>0)it.h=hv;
  it.col=document.getElementById('inC').value;
}
function dupItem(){if(sel<0)return;var s=IT[sel];IT.push({lb:s.lb+'②',cx:s.cx+0.5,cz:s.cz+0.5,w:s.w,d:s.d,h:s.h,col:s.col});sel=IT.length-1;sprop();}
function delItem(){if(sel<0)return;IT.splice(sel,1);sel=-1;sprop();}

// ── URL SHARE ──────────────────────────────────────────────────────
function shareURL(){
  try {
    var state=IT.map(function(it){return{lb:it.lb,cx:it.cx,cz:it.cz,w:it.w,d:it.d,h:it.h,col:it.col};});
    var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
    var url=location.href.split('#')[0]+'#'+encoded;
    navigator.clipboard.writeText(url).then(function(){
      var btn=document.getElementById('shareBtn');
      btn.textContent='✅ コピーしました！';
      btn.style.color='#ffffff';btn.style.background='#1a6a3a';
      setTimeout(function(){btn.textContent='🔗 共有URLをコピー';btn.style.color='#44cc88';btn.style.background='#0a2a1a';},2500);
    });
  } catch(e){ alert('URLのコピーに失敗しました。ブラウザのアドレスバーからコピーしてください。'); }
}

function loadFromURL(){
  var hash=location.hash.slice(1);
  if(!hash)return;
  try {
    var state=JSON.parse(decodeURIComponent(escape(atob(hash))));
    if(Array.isArray(state)&&state.length>0){
      IT.length=0;
      state.forEach(function(it){IT.push({lb:it.lb||'',cx:+it.cx||0,cz:+it.cz||0,w:+it.w||0.5,d:+it.d||0.5,h:+it.h||1,col:it.col||'#888888'});});
    }
  } catch(e){}
}
loadFromURL();

function downloadHTML(){
  var state=JSON.stringify(IT.map(function(it){return{lb:it.lb,cx:it.cx,cz:it.cz,w:it.w,d:it.d,h:it.h,col:it.col};}));
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  html=html.replace(/\/\*LAYOUT_START\*\/[\s\S]*?\/\*LAYOUT_END\*\//,'/*LAYOUT_START*/'+state+'/*LAYOUT_END*/');
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='TRAONE_editor_v3.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
}

function d2(){

function cp(){var sp=Math.cos(ph);return[cTX+ra*Math.sin(th)*sp,cTY+ra*Math.sin(ph),cTZ+ra*Math.cos(th)*sp];}
function ga(cam){
  var dx=cTX-cam[0],dy=cTY-cam[1],dz=cTZ-cam[2],l=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
  var fx=dx/l,fy=dy/l,fz=dz/l,rx,ry=0,rz;
  if(Math.abs(fy)>0.97){rx=1;rz=0;}else{rx=-fz;rz=fx;var rl=Math.sqrt(rx*rx+rz*rz)||1;rx/=rl;rz/=rl;}
  var ux=ry*fz-rz*fy,uy=rz*fx-rx*fz,uz=rx*fy-ry*fx;return{fx,fy,fz,rx,ry,rz,ux,uy,uz};
}
function prj(wx,wy,wz,cam,ax){
  var dx=wx-cam[0],dy=wy-cam[1],dz=wz-cam[2],dep=dx*ax.fx+dy*ax.fy+dz*ax.fz;
  if(dep<0.15)return null;var f=H*1.1/dep;
  return{sx:W/2+(dx*ax.rx+dy*ax.ry+dz*ax.rz)*f,sy:H/2-(dx*ax.ux+dy*ax.uy+dz*ax.uz)*f,d:dep};
}
function sh(hex,f){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgb('+Math.min(255,r*f|0)+','+Math.min(255,g*f|0)+','+Math.min(255,b*f|0)+')';}
function d3(){
  if(!W||!H)return;
  ctx.fillStyle='#08081a';ctx.fillRect(0,0,W,H);
  var cam=cp(),ax=ga(cam),faces=[],cx=cam[0],cy=cam[1],cz=cam[2];
  var boxes=ST.slice();
  for(var i=0;i<IT.length;i++){var it=IT[i];boxes.push([it.cx-it.w/2,0,it.cz-it.d/2,it.w,it.h,it.d,it.col,1]);}
  for(var bi=0;bi<boxes.length;bi++){
    var bx=boxes[bi],X=bx[0],Y=bx[1],Z=bx[2],BW=bx[3],BH=bx[4],BD=bx[5],col=bx[6],al=bx[7];
    var c=[[X,Y,Z],[X+BW,Y,Z],[X+BW,Y,Z+BD],[X,Y,Z+BD],[X,Y+BH,Z],[X+BW,Y+BH,Z],[X+BW,Y+BH,Z+BD],[X,Y+BH,Z+BD]];
    var fcc=[[X+BW/2,Y+BH,Z+BD/2],[X+BW/2,Y+BH/2,Z+BD],[X+BW/2,Y+BH/2,Z],[X+BW,Y+BH/2,Z+BD/2],[X,Y+BH/2,Z+BD/2]];
    for(var fi=0;fi<5;fi++){
      var fd=FD[fi],n=fd.n,fc=fcc[fd.ci];
      if(n[0]*(cx-fc[0])+n[1]*(cy-fc[1])+n[2]*(cz-fc[2])<=0)continue;
      var idx=fd.vi,pts=[],ok=true;
      for(var pi=0;pi<4;pi++){var pt=prj(c[idx[pi]][0],c[idx[pi]][1],c[idx[pi]][2],cam,ax);if(!pt){ok=false;break;}pts.push(pt);}
      if(!ok)continue;
      faces.push([pts,col,fd.s,al,(pts[0].d+pts[1].d+pts[2].d+pts[3].d)*.25]);
    }
  }
  faces.sort(function(a,b){return b[4]-a[4];});
  for(var fi2=0;fi2<faces.length;fi2++){
    var f=faces[fi2],p=f[0];
    ctx.globalAlpha=f[3];ctx.beginPath();ctx.moveTo(p[0].sx,p[0].sy);ctx.lineTo(p[1].sx,p[1].sy);ctx.lineTo(p[2].sx,p[2].sy);ctx.lineTo(p[3].sx,p[3].sy);ctx.closePath();
    ctx.fillStyle=sh(f[1],f[2]);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=0.6;ctx.stroke();ctx.globalAlpha=1;
  }
  ctx.globalAlpha=0.09;ctx.strokeStyle='#8888cc';ctx.lineWidth=0.5;
  for(var gx=-3;gx<=3;gx++){var a=prj(gx,0,-3,cam,ax),b=prj(gx,0,7,cam,ax);if(a&&b){ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.stroke();}}
  for(var gz=-3;gz<=7;gz++){var a2=prj(-3,0,gz,cam,ax),b2=prj(3,0,gz,cam,ax);if(a2&&b2){ctx.beginPath();ctx.moveTo(a2.sx,a2.sy);ctx.lineTo(b2.sx,b2.sy);ctx.stroke();}}
  ctx.globalAlpha=1;
}
